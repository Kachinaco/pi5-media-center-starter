<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL – SimplStream</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #fff; font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif; min-height: 100vh; }
.ss-header { background: #000; padding: 10px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 200; border-bottom: 1px solid #111; }
.ss-logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
.ss-logo .s1 { color: #4A90D9; } .ss-logo .s2 { color: #fff; }
.back-btn { background: none; border: 1px solid #2a2a2a; color: #888; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
.back-btn:hover { color: #fff; border-color: #555; }
.page-header { padding: 20px 24px 8px; display: flex; align-items: center; gap: 14px; }
.page-header h1 { font-size: 1.6rem; font-weight: 800; }
.date-nav { padding: 0 24px 14px; display: flex; align-items: center; gap: 10px; }
.date-btn { background: #0d0d0d; border: 1px solid #1e1e1e; color: #888; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
.date-btn:hover { color: #fff; }
.date-label { font-size: 0.95rem; font-weight: 600; color: #ccc; min-width: 200px; text-align: center; }
.status-bar { padding: 6px 24px; font-size: 0.78rem; color: #444; }
.games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; padding: 0 24px 32px; }
.game-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.12s; }
.game-card:hover { border-color: #4A90D9; transform: translateY(-2px); }
.game-card.live { border-color: #ef4444; }
.game-top { padding: 12px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
.game-status { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; }
.game-status.live { background: #ef4444; color: #fff; }
.game-status.final { background: #222; color: #777; }
.game-status.pre { background: #1e3a5f; color: #4A90D9; }
.game-venue { font-size: 0.7rem; color: #444; }
.game-teams { padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 10px; }
.team-row { display: flex; align-items: center; gap: 12px; }
.team-logo { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0; }
.team-info { flex: 1; }
.team-name { font-size: 0.95rem; font-weight: 700; }
.team-record { font-size: 0.72rem; color: #555; }
.team-score { font-size: 1.6rem; font-weight: 800; min-width: 36px; text-align: right; }
.team-score.winning { color: #4ade80; }
.team-score.pre { color: #333; font-size: 1rem; font-weight: 400; }
.game-footer { border-top: 1px solid #111; padding: 10px 16px; display: flex; gap: 8px; align-items: center; }
.watch-btn { flex: 1; background: #4A90D9; border: none; color: #fff; padding: 8px 0; border-radius: 6px; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
.watch-btn:hover { background: #3a80c9; }
.watch-btn.muted { background: #1a1a1a; color: #555; cursor: default; }
.period-info { font-size: 0.72rem; color: #666; }
.empty-state { padding: 80px 24px; text-align: center; color: #333; }
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
.player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 300; flex-direction: column; }
.player-overlay.open { display: flex; }
.player-top { padding: 8px 16px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #111; flex-shrink: 0; }
.player-close { background: #dc2626; border: none; color: #fff; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
.player-title-text { font-size: 0.9rem; font-weight: 600; flex: 1; }
.src-bar { display: flex; gap: 6px; padding: 6px 16px; background: #050505; flex-shrink: 0; flex-wrap: wrap; border-bottom: 1px solid #111; }
.src-btn { background: #111; border: 1px solid #1e1e1e; color: #888; padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 0.76rem; }
.src-btn:hover { color: #fff; }
.src-btn.active { background: #4A90D9; border-color: #4A90D9; color: #fff; }
.player-frame { flex: 1; min-height: 0; position: relative; }
.player-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
</style>
<link rel="stylesheet" href="/assets/fullscreen-fix.css?v=20260510141232"></head>
<body>
<div class="ss-header">
  <button class="back-btn" onclick="window.location.href='/'">&#8592; Back</button>
  <div class="ss-logo"><span class="s1">Simpl</span><span class="s2">Stream</span></div>
  <span style="color:#4A90D9;font-weight:800;margin-left:8px">NHL GAMES</span>
</div>
<div class="page-header"><h1>&#127944; NHL Games</h1></div>
<div class="date-nav">
  <button class="date-btn" onclick="changeDate(-1)">&#8249;</button>
  <div class="date-label" id="dateLabel">Loading...</div>
  <button class="date-btn" onclick="changeDate(1)">&#8250;</button>
</div>
<div class="status-bar" id="statusBar">Fetching schedule...</div>
<div class="games-grid" id="gamesGrid"></div>
<div class="empty-state" id="emptyState" style="display:none"><div class="emoji">&#127944;</div><p>No NHL games scheduled for this date.</p></div>

<div class="player-overlay" id="playerOverlay">
  <div class="player-top">
    <button class="player-close" onclick="closePlayer()">&#x2715;</button>
    <span class="player-title-text" id="playerTitle"></span>
  </div>
  <div class="src-bar" id="srcBar"></div>
  <div class="player-frame">
    <iframe id="playerFrame" allow="autoplay *; fullscreen *; picture-in-picture *; encrypted-media *; accelerometer *; gyroscope *" referrerpolicy="no-referrer" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>
  </div>
</div>

<script>
// Use local date in America/Phoenix timezone
var now = new Date();
var phoenixOffset = -7; // UTC-7 (MST, no DST)
var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
var phoenixTime = new Date(utc + (3600000 * phoenixOffset));
let currentDate = phoenixTime;
let games = [];
let activeSource = 'buffstreams';
let currentGame = null;
let streamedCache = [];

function formatDate(d) {
  // Format date in local time, not UTC
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function formatDisplay(d) {
  var today = new Date(), ds = formatDate(d), ts = formatDate(today);
  var y = new Date(today); y.setDate(today.getDate()-1);
  var tm = new Date(today); tm.setDate(today.getDate()+1);
  var opts = { month:'long', day:'numeric' };
  if (ds===ts) return 'Today — '+d.toLocaleDateString('en-US',opts);
  if (ds===formatDate(y)) return 'Yesterday — '+d.toLocaleDateString('en-US',opts);
  if (ds===formatDate(tm)) return 'Tomorrow — '+d.toLocaleDateString('en-US',opts);
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function changeDate(n) { currentDate = new Date(currentDate); currentDate.setDate(currentDate.getDate()+n); loadGames(); }

async function fetchStreamed() {
  streamedCache = [];
  try { var r1 = await fetch('/streamed-api/matches/hockey/popular'); if(r1.ok) streamedCache = await r1.json(); } catch(e){}
  try { var r2 = await fetch('/streamed-api/matches/hockey/live'); if(r2.ok) { var live = await r2.json(); streamedCache = streamedCache.concat(live); } } catch(e){}
}

function findStream(away, home) {
  var n = function(s){ return (s||'').toLowerCase().replace(/[^a-z]/g,''); };
  var a = n(away), h = n(home);
  for (var i=0; i<streamedCache.length; i++) {
    var m = streamedCache[i];
    var t = n(m.title||''), t1 = n((m.teams&&m.teams.home&&m.teams.home.name)||''), t2 = n((m.teams&&m.teams.away&&m.teams.away.name)||'');
    if ((t.indexOf(a)>=0||t2.indexOf(a)>=0) && (t.indexOf(h)>=0||t1.indexOf(h)>=0)) return m.id;
  }
  return null;
}

async function loadGames() {
  document.getElementById('dateLabel').textContent = formatDisplay(currentDate);
  document.getElementById('gamesGrid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('statusBar').textContent = 'Fetching schedule...';
  var ds = formatDate(currentDate);
  await fetchStreamed();
  try {
    var res = await fetch('/nhl-api/v1/schedule/'+ds);
    var data = await res.json();
    var day = (data.gameWeek||[]).find(function(d){ return d.date===ds; });
    games = (day ? day.games||[] : []).map(function(g){
      return Object.assign({}, g, { streamId: findStream((g.awayTeam.commonName&&g.awayTeam.commonName.default)||g.awayTeam.abbrev, (g.homeTeam.commonName&&g.homeTeam.commonName.default)||g.homeTeam.abbrev) });
    });
    if (!games.length) { document.getElementById('statusBar').textContent=''; document.getElementById('emptyState').style.display='block'; return; }
    document.getElementById('statusBar').textContent = games.length+' game'+(games.length!==1?'s':'')+' — click to watch';
    renderGames();
  } catch(e) { document.getElementById('statusBar').textContent = 'Failed to load schedule.'; }
}

function getStatus(g) { var s=g.gameState; return (s==='LIVE'||s==='CRIT')?'live':(s==='FINAL'||s==='OFF')?'final':'pre'; }
function getStatusLabel(g) {
  var s=g.gameState;
  if (s==='LIVE'||s==='CRIT') { var pt=g.periodDescriptor&&g.periodDescriptor.periodType, clk=(g.clock&&g.clock.timeRemaining)||'', p=g.periodDescriptor&&g.periodDescriptor.number; if(pt==='OT') return 'OT '+clk; if(pt==='SO') return 'Shootout'; return (p===1?'1st':p===2?'2nd':p===3?'3rd':'P'+p)+' '+clk; }
  if (s==='FINAL'||s==='OFF') { var pt2=g.periodDescriptor&&g.periodDescriptor.periodType; return pt2==='OT'?'Final/OT':pt2==='SO'?'Final/SO':'Final'; }
  if (g.startTimeUTC) return new Date(g.startTimeUTC).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/Phoenix',timeZoneName:'short'});
  return 'Scheduled';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderGames() {
  document.getElementById('gamesGrid').innerHTML = games.map(function(g,i){
    var away=g.awayTeam, home=g.homeTeam, st=getStatus(g), sl=getStatusLabel(g);
    var isPre=st==='pre', isLive=st==='live';
    var as=away.score!=null?away.score:'', hs=home.score!=null?home.score:'';
    var awW=!isPre&&as!==''&&hs!==''&&as>hs, hmW=!isPre&&as!==''&&hs!==''&&hs>as;
    var awayName=(away.commonName&&away.commonName.default)||away.abbrev;
    var homeName=(home.commonName&&home.commonName.default)||home.abbrev;
    var btnLabel=isPre&&!g.streamId?'&#9200; Not Started':isLive?'&#9654; Watch Live':'&#9654; Watch';
    return '<div class="game-card '+st+'" onclick="handleClick('+i+')">'
      +'<div class="game-top"><span class="game-status '+st+'">'+(isLive?'&#9679; LIVE':sl)+'</span><span class="game-venue">'+esc((g.venue&&g.venue.default)||'')+'</span></div>'
      +'<div class="game-teams">'
      +'<div class="team-row"><img class="team-logo" src="https://assets.nhle.com/logos/nhl/svg/'+away.abbrev+'_light.svg" onerror="this.style.opacity=0"><div class="team-info"><div class="team-name">'+esc(awayName)+'</div><div class="team-record">'+esc(away.record||'')+'</div></div><div class="team-score '+(isPre?'pre':awW?'winning':'')+'">'+esc(isPre?'':as)+'</div></div>'
      +'<div class="team-row"><img class="team-logo" src="https://assets.nhle.com/logos/nhl/svg/'+home.abbrev+'_light.svg" onerror="this.style.opacity=0"><div class="team-info"><div class="team-name">'+esc(homeName)+'</div><div class="team-record">'+esc(home.record||'')+'</div></div><div class="team-score '+(isPre?'pre':hmW?'winning':'')+'">'+esc(isPre?'':hs)+'</div></div>'
      +'</div>'
      +'<div class="game-footer"><button class="watch-btn '+(isPre&&!g.streamId?'muted':'')+'">'+btnLabel+'</button>'+(isLive?'<span class="period-info">'+esc(sl)+'</span>':'')+'</div>'
      +'</div>';
  }).join('');
}

function handleClick(i) {
  var g=games[i];
  if (getStatus(g)==='pre'&&!g.streamId) return;
  currentGame=g;
  var away=(g.awayTeam.commonName&&g.awayTeam.commonName.default)||g.awayTeam.abbrev;
  var home=(g.homeTeam.commonName&&g.homeTeam.commonName.default)||g.homeTeam.abbrev;
  document.getElementById('playerTitle').textContent=away+' @ '+home;
  buildSrcBar(); loadStream();
  document.getElementById('playerOverlay').classList.add('open');
}

function getStreamUrl(src) {
  if (!currentGame) return '';
  var g=currentGame;
  var away=(g.awayTeam.commonName&&g.awayTeam.commonName.default)||g.awayTeam.abbrev;
  var home=(g.homeTeam.commonName&&g.homeTeam.commonName.default)||g.homeTeam.abbrev;
  var slug=away.toLowerCase().replace(/\s+/g,'-')+'-vs-'+home.toLowerCase().replace(/\s+/g,'-');
  if (src==='buffstreams') return 'https://buffstreams.app/live/nhl';
  if (src==='livetv') return 'https://livetv.sx/en/allupcomingsports/6/';
  if (src==='sportsurge') return 'https://sportsurge.uno/hockey/';
  if (src==='sportsbay') return 'https://www.sportsbay.org/sports/nhl';
  if (src==='nhltv') return 'https://www.nhl.com/tv/'+g.awayTeam.abbrev.toLowerCase()+'-vs-'+g.homeTeam.abbrev.toLowerCase();
  return 'https://livetv.sx/en/allupcomingsports/6/';
}

function buildSrcBar() {
  var sources=[{id:'buffstreams',label:'BuffStreams'},{id:'livetv',label:'LiveTV'},{id:'sportsurge',label:'SportsUrge'},{id:'sportsbay',label:'SportsBay'},{id:'nhltv',label:'NHL.com'}];
  document.getElementById('srcBar').innerHTML=sources.map(function(s){ return '<button class="src-btn '+(s.id===activeSource?'active':'')+'" onclick="switchSrc(\''+s.id+'\')">'+s.label+'</button>'; }).join('');
}
function switchSrc(id) { activeSource=id; buildSrcBar(); loadStream(); }
function loadStream() { document.getElementById('playerFrame').src=getStreamUrl(activeSource); }
function closePlayer() { document.getElementById('playerOverlay').classList.remove('open'); document.getElementById('playerFrame').src=''; }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closePlayer(); });
loadGames();
</script>
<script src="/assets/fullscreen-fix.js?v=20260510194542"></script></body>
</html>
